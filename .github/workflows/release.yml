name: Auto Release

on:
  push:
    branches:
      - main

permissions:
  contents: write # リリース作成／アセット管理に必要
  packages: write # （必要

jobs:
  build_and_release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: "16"

      - name: Install dependencies
        run: npm ci

      - name: Build and bundle
        run: npm run release

      - name: Determine release version
        id: version
        run: |
          latest_tag=$(git tag -l 'v2.0.*' --sort=-v:refname | head -n 1)
          if [ -z "$latest_tag" ]; then
            version="v2.0.0"
          else
            patch="${latest_tag##*.}"
            version="v2.0.$((patch + 1))"
          fi
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "asset_name=x-autopost-$version.zip" >> "$GITHUB_OUTPUT"

      - name: Archive build output
        run: |
          mkdir -p release
          zip -r "release/${{ steps.version.outputs.asset_name }}" dist code.js

      - name: Create GitHub Release
        id: create_release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ github.token }}
        with:
          tag_name: ${{ steps.version.outputs.version }}
          release_name: Release ${{ steps.version.outputs.version }}
          draft: false
          prerelease: false

      - name: Upload Release Asset
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ github.token }}
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: ./release/${{ steps.version.outputs.asset_name }}
          asset_name: ${{ steps.version.outputs.asset_name }}
          asset_content_type: application/zip
